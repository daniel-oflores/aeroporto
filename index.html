<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel FIDS - Aeroporto Inteligente</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; }
        .card-voo { background-color: #333; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 5px solid #f1c40f;}
        .botao-decolar { background: #e74c3c; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="torre-controle" style="background: #2c3e50; padding: 20px; margin-bottom: 20px;">
        <h2>Torre de Controle: Novo Despacho</h2>
        
        <form id="formDespacho">
            <input type="text" id="inputCodigo" placeholder="Código (Ex: G3-777)" required>
            <input type="text" id="inputDestino" placeholder="Destino (Ex: Tóquio)" required>
            <button type="submit">Registrar Voo</button>
        </form>
    </div>

    <h1>Painel de Partidas 🛫</h1>
    <div id="telaDoAeroporto"></div>
</body>
    <script type="module" src="Voo.js"></script>
    <script type="module" src="Aeroporto.js"></script>
    <script type="module" src="main.js"></script>
    <script type="module" src="painel.js"></script>
</html>
